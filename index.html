<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collected Works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F6F4EE;
    --paper-raised: #FBFAF6;
    --ink: #211F1C;
    --ink-soft: #59564E;
    --ink-faint: #9A9689;
    --accent: #3F4B3D;
    --accent-soft: #6C7A67;
    --rule: #DBD6C8;
    --measure: 62ch;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Lora', serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; }

  .wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ---------- Header ---------- */
  header.site {
    padding: 64px 0 40px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  header.site .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-soft);
    margin-bottom: 18px;
  }
  header.site h1 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(2.4rem, 5vw, 3.4rem);
    margin: 0 0 14px;
    letter-spacing: -0.01em;
  }
  header.site .byline {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  header.site .epigraph {
    margin-top: 26px;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 15px;
  }

  nav.top {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 22px 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.03em;
  }
  nav.top button {
    background: none;
    border: none;
    color: var(--ink-soft);
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 3px;
    font-family: inherit;
    font-size: inherit;
  }
  nav.top button:hover { color: var(--ink); }
  nav.top button.active {
    color: var(--paper);
    background: var(--accent);
  }
  nav.top button:focus-visible,
  a:focus-visible,
  .piece-row:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  main { min-height: 50vh; padding-bottom: 90px; }

  /* ---------- Contents (home) ---------- */
  .chapter {
    margin-top: 46px;
  }
  .chapter-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    cursor: pointer;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .chapter-head h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 1.5rem;
    margin: 0;
    white-space: nowrap;
  }
  .leader {
    flex: 1;
    border-bottom: 1px dotted var(--ink-faint);
    transform: translateY(-6px);
  }
  .chapter-head .count {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  .piece-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    cursor: pointer;
  }
  .piece-row:last-child { border-bottom: none; }
  .piece-title {
    font-size: 1.02rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .piece-row .leader { transform: translateY(-4px); }
  .piece-meta {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    color: var(--ink-faint);
    white-space: nowrap;
  }
  .piece-row:hover .piece-title { color: var(--accent); }

  /* ---------- Category list view ---------- */
  .back-link {
    display: inline-block;
    margin: 34px 0 6px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
  }
  .back-link:hover { color: var(--accent); }
  .category-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 2rem;
    margin: 6px 0 26px;
  }

  /* ---------- Reading view ---------- */
  .reading {
    padding-top: 30px;
  }
  .page-no {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .reading h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    margin: 10px 0 6px;
  }
  .reading .meta {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 36px;
  }
  .reading .body {
    max-width: var(--measure);
    font-size: 1.08rem;
  }
  .reading .body p {
    margin: 0 0 1.3em;
  }
  .reading .body p.stanza-break {
    margin-bottom: 2em;
  }
  .poetry-body p { white-space: pre-line; }

  .piece-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
  }
  .piece-nav a { text-decoration: none; color: var(--ink-soft); }
  .piece-nav a:hover { color: var(--accent); }
  .piece-nav .dir {
    display: block;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }

  footer.site {
    text-align: center;
    padding: 30px 0 60px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-faint);
  }

  @media (max-width: 560px) {
    .wrap { padding: 0 18px; }
    header.site { padding: 48px 0 30px; }
    .piece-meta { display: none; }
  }

  .fade-in { animation: fadeIn 0.45s ease both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header class="site">
  <div class="wrap">
    <div class="kicker">A Collection</div>
    <h1>Collected Works</h1>
    <div class="byline">Your Name — updated 2026</div>
    <div class="epigraph">Everything here was true before it was written.</div>
  </div>
</header>

<nav class="top" id="topnav">
  <button data-view="home">Contents</button>
  <button data-view="poetry">Poetry</button>
  <button data-view="stories">Short Stories</button>
  <button data-view="essays">Essays</button>
</nav>

<main class="wrap" id="main"></main>

<footer class="site">Collected Works &middot; a running body of writing, paginated as one book</footer>

<script>
/* ----------------------------------------------------------------
   PLACEHOLDER CONTENT — replace the text below with your own work.
   Keep the same structure (title, date, excerpt, body) so the
   layout, pagination, and table of contents keep working.
------------------------------------------------------------------- */
const pieces = [
  {
    type: 'poetry', title: 'Low Tide',
    date: 'March 2024',
    excerpt: 'The sea keeps what we give it, and gives back only the shape.',
    body: `The sea keeps what we give it,
and gives back only the shape —
a shoe, a bottle, a name
worn soft at the edges.

I used to think losing things
was a kind of failure.
Now I think the tide
is just an honest accountant.

[Replace this poem with your own. Line breaks and stanza
spacing are preserved automatically — just write normally.]`
  },
  {
    type: 'poetry', title: 'Kitchen, 2 A.M.',
    date: 'November 2023',
    excerpt: 'The fridge hums the only hymn awake at this hour.',
    body: `The fridge hums the only hymn
awake at this hour.

I am here for water
and stay for the quiet,
which tastes like nothing
and fills me anyway.

[Placeholder — swap in your own poem here.]`
  },
  {
    type: 'poetry', title: 'Inheritance',
    date: 'July 2022',
    excerpt: 'My grandmother\u2019s hands, folded now into mine.',
    body: `My grandmother's hands,
folded now into mine —
the same knuckle, the same
stubborn line at the wrist.

She taught me to fold dough,
not grief. I learned the second
by watching her do the first.

[Placeholder poem text.]`
  },
  {
    type: 'stories', title: 'The Long Way Round',
    date: 'September 2023',
    excerpt: 'Every summer, Marisol took the long way home, and every summer she found something new.',
    body: [
      "[Placeholder short story — replace this with your own text. This paragraph and the ones below show roughly how much room a story gets on the page; feel free to make it as long as you like.]",
      "Every summer, Marisol took the long way home, past the drainage ditch and the Kowalski's dead orchard, because the short way meant walking past the house where the dog used to bark, and the dog was gone now, and somehow that was worse.",
      "This year the ditch was dry. She found a shopping cart on its side, half swallowed by johnsongrass, and a single yellow rubber boot with no partner anywhere in sight.",
      "She did not know yet that this was the last summer she would take this route — that in the fall her family would move two towns over, and the long way home would become just a place she used to know. But that afternoon, she only knew the boot, and the quiet, and the particular gold of late light through dry grass.",
      "(Continue the story here.)"
    ]
  },
  {
    type: 'stories', title: 'Weather Report',
    date: 'January 2024',
    excerpt: 'The forecast called for clear skies. It had been wrong before.',
    body: [
      "[Placeholder short story text — replace with your own.]",
      "The forecast called for clear skies. It had been wrong before, and Dana had learned not to trust a sentence that confident about the future.",
      "Still, she hung the laundry out, because some optimism has to be practiced to be believed, and a clothesline is as good a place as any to start.",
      "(Continue the story here.)"
    ]
  },
  {
    type: 'essays', title: 'On Writing Slowly',
    date: 'April 2024',
    excerpt: 'A short essay on patience, drafts, and the myth of the first good sentence.',
    body: [
      "[Placeholder essay — replace this with your own writing.]",
      "There is a myth that good writers arrive at the good sentence first, as if the right words were simply waiting, in order, for someone patient enough to notice them. In practice, most sentences worth keeping are the fourth or fifth attempt, sanded down from something clumsier.",
      "I've come to think of a slow draft not as a failure of talent but as a kind of respect for the reader — a willingness to do the work of clarity before asking someone else's attention for it.",
      "(Continue the essay here.)"
    ]
  },
  {
    type: 'essays', title: 'Small Rooms',
    date: 'August 2023',
    excerpt: 'What four different apartments taught me about how space shapes a life.',
    body: [
      "[Placeholder essay text — replace with your own.]",
      "I have lived in four small rooms in four different cities, and each one taught me something different about the shape a life takes when it has to fit into 300 square feet.",
      "The first room taught me what I could live without. The second taught me what I couldn't. The third and fourth are still teaching me, which is either a sign of slow learning or evidence that the lesson doesn't end.",
      "(Continue the essay here.)"
    ]
  }
];

/* ---------------------------------------------------------------- */

const CATEGORY_LABEL = { poetry: 'Poetry', stories: 'Short Stories', essays: 'Essays' };

// Assign a running page number to every piece, in collection order —
// this is the "book" pagination used throughout the site.
pieces.forEach((p, i) => p.page = i + 1);

const main = document.getElementById('main');
const navButtons = document.querySelectorAll('#topnav button');

function setActiveNav(view) {
  navButtons.forEach(b => b.classList.toggle('active', b.dataset.view === view));
}

function leader() { return '<span class="leader"></span>'; }

function renderHome() {
  setActiveNav('home');
  const cats = ['poetry', 'stories', 'essays'];
  let html = '';
  cats.forEach(cat => {
    const items = pieces.filter(p => p.type === cat);
    html += `
      <div class="chapter fade-in">
        <div class="chapter-head" data-cat="${cat}" tabindex="0" role="button">
          <h2>${CATEGORY_LABEL[cat]}</h2>
          ${leader()}
          <span class="count">${items.length} piece${items.length !== 1 ? 's' : ''}</span>
        </div>
        ${items.map(p => rowHtml(p)).join('')}
      </div>`;
  });
  main.innerHTML = html;
  attachRowHandlers();
  main.querySelectorAll('.chapter-head').forEach(h => {
    h.addEventListener('click', () => navigateTo(h.dataset.cat));
    h.addEventListener('keydown', e => { if (e.key === 'Enter') navigateTo(h.dataset.cat); });
  });
}

function rowHtml(p) {
  return `
    <a class="piece-row fade-in" data-id="${p.page}" tabindex="0">
      <span class="piece-title">${p.title}</span>
      ${leader()}
      <span class="piece-meta">p. ${p.page}</span>
    </a>`;
}

function renderCategory(cat) {
  setActiveNav(cat);
  const items = pieces.filter(p => p.type === cat);
  main.innerHTML = `
    <a class="back-link" data-nav="home">&larr; Contents</a>
    <h2 class="category-title fade-in">${CATEGORY_LABEL[cat]}</h2>
    <div class="fade-in">${items.map(p => rowHtml(p)).join('')}</div>
  `;
  attachRowHandlers();
  attachBackHandler();
}

function attachRowHandlers() {
  main.querySelectorAll('.piece-row').forEach(row => {
    row.addEventListener('click', () => renderPiece(parseInt(row.dataset.id, 10)));
    row.addEventListener('keydown', e => {
      if (e.key === 'Enter') renderPiece(parseInt(row.dataset.id, 10));
    });
  });
}

function attachBackHandler() {
  const back = main.querySelector('.back-link');
  if (back) back.addEventListener('click', () => navigateTo('home'));
}

function renderPiece(pageNo) {
  const p = pieces.find(pp => pp.page === pageNo);
  if (!p) return;
  const isPoetry = p.type === 'poetry';
  const bodyHtml = isPoetry
    ? `<div class="poetry-body"><p>${p.body}</p></div>`
    : p.body.map(par => `<p>${par}</p>`).join('');

  const idx = pieces.findIndex(pp => pp.page === pageNo);
  const prev = pieces[idx - 1];
  const next = pieces[idx + 1];

  main.innerHTML = `
    <a class="back-link" data-nav="${p.type}">&larr; ${CATEGORY_LABEL[p.type]}</a>
    <div class="reading fade-in">
      <div class="page-no">Page ${p.page} of ${pieces.length}</div>
      <h1>${p.title}</h1>
      <div class="meta">${CATEGORY_LABEL[p.type]} &middot; ${p.date}</div>
      <div class="body">${bodyHtml}</div>
      <div class="piece-nav">
        <span>${prev ? `<a data-page="${prev.page}"><span class="dir">&larr; Previous</span>${prev.title}</a>` : ''}</span>
        <span>${next ? `<a data-page="${next.page}"><span class="dir">Next &rarr;</span>${next.title}</a>` : ''}</span>
      </div>
    </div>
  `;
  setActiveNav(p.type);
  attachBackHandler();
  main.querySelectorAll('.piece-nav a').forEach(a => {
    a.addEventListener('click', () => renderPiece(parseInt(a.dataset.page, 10)));
  });
  window.scrollTo({ top: 0, behavior: 'auto' });
}

function navigateTo(view) {
  if (view === 'home') renderHome();
  else renderCategory(view);
  window.scrollTo({ top: 0, behavior: 'auto' });
  history.replaceState(null, '', '#' + view);
}

navButtons.forEach(b => b.addEventListener('click', () => navigateTo(b.dataset.view)));

// Initial render, respecting a hash if present (e.g. shared link to #poetry)
const initial = (location.hash || '').replace('#', '');
if (['poetry', 'stories', 'essays'].includes(initial)) navigateTo(initial);
else renderHome();
</script>
</body>
</html>
